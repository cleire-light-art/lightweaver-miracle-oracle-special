<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP','ヒラギノ明朝 Pro',serif;}
.app{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(200,210,255,0.55) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(220,190,255,0.45) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 15%, rgba(180,240,255,0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 15% 75%, rgba(255,200,230,0.35) 0%, transparent 45%),
    linear-gradient(160deg, #dce8ff 0%, #e8d8f8 25%, #f0e0f5 45%, #fce8f0 65%, #e8f0ff 85%, #d8eeff 100%);
  padding:2rem 1rem 3rem;
  position:relative;
  overflow:hidden;
}
.holo-layer{
  position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(180,200,255,0.04) 60px, rgba(180,200,255,0.04) 61px),
    repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(220,180,255,0.04) 60px, rgba(220,180,255,0.04) 61px);
  animation: holoShift 8s ease-in-out infinite alternate;
}
@keyframes holoShift{
  0%{opacity:0.4;}
  50%{opacity:1;}
  100%{opacity:0.4;}
}
.shimmer{
  position:absolute;inset:0;pointer-events:none;
  background: conic-gradient(from 0deg at 50% 50%,
    rgba(200,220,255,0.08),rgba(220,180,255,0.1),rgba(255,200,230,0.08),
    rgba(180,240,255,0.1),rgba(200,255,220,0.06),rgba(255,220,200,0.08),
    rgba(200,220,255,0.08));
  animation: spin 20s linear infinite;
}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
.inner{max-width:420px;margin:0 auto;position:relative;z-index:1;}
.header{text-align:center;margin-bottom:2rem;padding-top:0.5rem;}
.header-deco{font-size:14px;letter-spacing:0.35em;color:rgba(140,120,180,0.7);margin-bottom:0.6rem;font-family:'Cormorant Garamond',serif;}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:6px;}
.logo-main{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:300;font-style:italic;
  letter-spacing:0.06em;line-height:1.2;
  background:linear-gradient(135deg,#8a7ab8 0%,#b89ad8 30%,#d4aacc 55%,#c8b4e0 75%,#90a8d0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(180,160,220,0.5));
}
.header p{font-size:14px;color:rgba(130,110,170,0.7);letter-spacing:0.18em;margin-top:4px;}

soul:"本当の勇氣とは、重さを抱えたまま進むことではなく、その重さをそっと置いて、軽やかに飛び立つことを選ぶことかもしれない。あなたの魂はその翼を、ずっと持っていた。",
upright:"一歩踏み出すのに、完璧な準備は必要ありません。今のあなたには、次の扉を開くのに十分な勇氣がすでに宿っています。恐れを感じながらでも、ハートが「行きたい」と言う方向へ進んでみてください。軽やかさとは感情の軽さではなく、重さを抱えながらも前を向く選択のことです。その一歩が、あなたを夢の場所へ連れて行きます。",
reversed:"一人で抱えすぎて、少し疲れていませんか？責任感が強く、弱さを見せることが苦手なあなたへ。助けを求めることは、弱さではなく、自分を大切にする美しい勇氣です。今日は誰かに「実は大変なんだ」と正直に話してみてください。その言葉が、あなたの肩の荷を軽くする最初の一歩になります。",
affirmation:"「私は軽やかに、前へ進む」\n「私には、飛び立つ勇氣がある」",
elements:[  {name:"アンドロメダの女神",meaning:"既存の枠を超えた解放と、新しい現実の創造者"},
  {name:"風船",meaning:"夢へと向かう軽やかな意志と、手放す勇氣"},
  {name:"ライオン",meaning:"内側から湧き出る勇氣と、誇り高き力強さ"},
  {name:"りんご",meaning:"知恵の実りと、誘惑や恐れを超えていく力"}],imageUrl:"https://www.dropbox.com/scl/fi/hdltit59grqc68ghk6d3b/oracleapp_6.png?rlkey=wcamif9hni8awj3vdp6voxx9q&st=uj95sg3f&raw=1"},

{id:7,en:"Eternity and Balance",ja:"永遠とバランス",
soul:"宇宙はいつも、永遠のリズムでバランスを取り戻していく。あなたもその宇宙の一部として、揺れながらも必ず中心に戻る力を持っている。",
upright:"今のあなたの人生は、ちょうど良いバランスの中にあります。与えることと受け取ること、動くことと休むこと、その両方を大切にしているあなたの選択が、今日この調和を生んでいます。完璧である必要はありません。揺れながらも戻ってくる、そのプロセス自体が、永遠のリズムの一部です。今のあなたはすでに、最善のバランスの中にいます。",
reversed:"あなたのバランスは、もう整い始めています。今もし「傾いている」と感じるなら、それはバランスが崩れているのではなく、あなた自身がバランスに意識を向け始めた証です。氣づいた時点で、もう半分以上戻ってきています。ここから少しだけ反対側に重心を移してみてください。宇宙は必ずあなたを中心へと引き戻す力を持っています。",
affirmation:"「私はいつも、中心に戻ってくる」\n「陰と陽が、私の中で調和していく」",
elements:[  {name:"オリオンの女神",meaning:"宇宙的な秩序を守る戦士の魂と、万物を貫くバランスの力"},
  {name:"インフィニティ",meaning:"終わりのないサイクルと、永遠に続く生命の流れ"},
  {name:"カメ",meaning:"急がず、でも確実に進む忍耐と、時間を超えた長寿の知恵"},
  {name:"三角形",meaning:"調和・創造・顕現の三位一体、安定の象徴"}],imageUrl:"https://www.dropbox.com/scl/fi/f2l6lt95bah8xi8fpz9r7/oracleapp_7.png?rlkey=z2c6a0su46u7t2l2dqdogx667&st=sxkdfuz1&raw=1"},

{id:8,en:"Emotional Healing and Creativity",ja:"感情の癒しと創造性",
soul:"感情は、あなたの魂が世界と対話するための言語。その深さを恐れずに感じるとき、あなたの内側から最も美しい創造が生まれてくる。",
upright:"今、感情を表現することが癒しへの近道です。泣きたければ泣いていい。喜びたければ思い切り喜んでいい。その感情の動きが、あなたの創造力の源となっています。何かを作ること、書くこと、歌うこと、体を動かすこと。形は何でもいい。今日は感情をそのまま表現する時間を、自分にプレゼントしてみてください。",
reversed:"感情を押し込めて、「大丈夫」と言い続けていませんか？感じないようにしているのは、傷つきたくないあなたの優しい自己防衛です。でもその感情は、流れを止められた川のように、出口を探しています。今日は誰にも見せなくていいので、一人で感じる時間を作ってみてください。感情を感じることが、あなたの創造の扉を再び開きます。",
affirmation:"「私の感情は、美しい創造の源」\n「私は感じることを、恐れない」",
elements:[  {name:"リラ",meaning:"感情の繊細さと、宇宙の創造エネルギーの源"},
  {name:"水",meaning:"感情・流れ・浄化、すべての生命を育む元素"},
  {name:"カエル",meaning:"変容と豊かさ、雨の恵みと感情の解放"},
  {name:"ハープ",meaning:"魂の音楽と、宇宙のリズムと共鳴する力"}],imageUrl:"https://www.dropbox.com/scl/fi/29s4b35z5ofja1uo2vf1s/oracleapp_8.png?rlkey=iyeobxppj242xh8xyn88a7hyg&st=cw07im8d&raw=1"},

{id:9,en:"Joy and Blessings",ja:"喜びと祝福",
soul:"あなたの喜びは、宇宙への最高のギフト。心から喜べる瞬間を生きるたびに、あなたは世界に光を贈っている。",
upright:"今、祝福のエネルギーがあなたのもとに溢れています。それはどこか遠くからやってくるのではなく、あなた自身の喜びが引き寄せているものです。幸せを受け取ることへの遠慮を手放してください。あなたが心から喜ぶ姿が、周りの人の喜びにもなります。今日は「嬉しい」「ありがとう」という言葉を、声に出してみてください。",
reversed:"祝福のエネルギーは、あなたのすぐそこまで届いています。あともう少し、受け取る準備を整えるだけ。もし「これくらいで喜んでいいのかな」という遠慮があるなら、それを今日だけそっと横に置いてみてください。喜びはあなたの権利であり、魂の本来の状態です。日常の小さなことから「これが好き」「これが嬉しい」と認めることから始めてみてください。その小さな許可が、大きな祝福の扉を開きます。",
affirmation:"「私は喜びと祝福の中にいる」\n「私は幸せを、受け取っていい」",
elements:[  {name:"ベガの女神",meaning:"純粋な喜びと芸術の守護者、魂の祝祭を司る女神"},
  {name:"ケーキ",meaning:"人生の甘さと祝祭、大切な瞬間を祝う喜び"},
  {name:"白鳥",meaning:"優雅さと愛、魂の美しさを映す鏡"},
  {name:"ハート",meaning:"愛と感謝、すべての繋がりの中心にあるもの"}],imageUrl:"https://www.dropbox.com/scl/fi/itnbizuljzuw2bd3lim6t/oracleapp_9.png?rlkey=ltds2egrjytu30w6gognf3nwn&st=j7si8dot&raw=1"},

{id:10,en:"Abundant Love and Peace",ja:"豊かな愛と平和",
soul:"愛と平和は、どこか遠くから手に入れるものではない。それはすでに、あなたの内側に宿っている。その泉に氣づいた瞬間、世界は変わり始める。",
upright:"今、愛のエネルギーがあなたの周りに広がっています。あなたが誰かに向ける優しさが、そのまま宇宙を巡ってあなたへと戻ってきます。愛を与えることと受け取ることを、どちらも大切にしてください。日常の中で、穏やかな平和を感じる瞬間を意識して探してみてください。その小さな氣づきが、豊かな愛の現実を育てていきます。",
reversed:"「愛されたい」という氣持ちと、「愛されるはずがない」という信念が、心の中で葛藤していませんか？それはあなたが、愛をとても大切にしている証です。まず、自分自身への愛から始めてみてください。今日一日、自分に優しい言葉をかけてみてください。あなたが自分を愛するほど、外側の世界も愛で満たされていきます。",
affirmation:"「私は愛と平和の中にいる」\n「私はすでに、十分に愛されている」",
elements:[  {name:"金星の女神",meaning:"愛と美と豊かさの守護者、女性性の輝きの象徴"},
  {name:"卵",meaning:"新たな始まりと可能性、まだ見ぬ愛の誕生"},
  {name:"クマ",meaning:"守護と母性、大地の力強くあたたかい愛"},
  {name:"アメジスト",meaning:"霊的な覚醒と、内なる平和を育む紫の光"}],imageUrl:"https://www.dropbox.com/scl/fi/oiic65q91186z1ypjg0p4/oracleapp_10.png?rlkey=cgzboei0hzk4b8pcjlvmd23h1&st=3h50rsu7&raw=1"},

{id:11,en:"Strength and Protection",ja:"強さと守護",
soul:"あなたは今この瞬間も、見えない存在たちに守られている。その守護は条件付きではなく、あなたがどんな状態であっても、変わることなくそこにある。",
upright:"今、強力な守護のエネルギーがあなたを包んでいます。一人で戦っているように感じても、あなたの周りには見えないサポートが降り注いでいます。自分の強さを信じてください。あなたの強さは、完璧であることからではなく、それでも前を向こうとする意志から生まれています。今日も、あなたは守られながら光の道を歩んでいます。",
reversed:"自分を守るために、心に厚い壁を作ってしまっていませんか？その壁は、傷ついてきたあなたが作り上げた、愛ある自己防衛です。でも今は、少しだけその壁に小さな窓を開けてもいい時かもしれません。本当の強さとは、心を開く勇氣の中にあります。信頼できる人に、今の自分の状態を正直に話してみてください。それがあなたの新しい強さの始まりです。",
affirmation:"「私はいつも守られている」\n「私の内側に、揺るぎない強さがある」",
elements:[  {name:"ゼータレチクルの女神",meaning:"次元を超えた知性と、宇宙的な守護の力"},
  {name:"剣",meaning:"真実を切り開く明晰さと、守護の強い意志"},
  {name:"狼",meaning:"本能と忠誠心、群れで支え合う力の象徴"},
  {name:"葉っぱ",meaning:"自然の持つ治癒力と、静かに育ち続ける生命力"}],imageUrl:"https://www.dropbox.com/scl/fi/rqv6xv24iico09dbkbisc/oracleapp_11.png?rlkey=okpgshmzcccq7itni9womu3s1&st=gfnyyuom&raw=1"},

{id:12,en:"Adventure and Glory",ja:"冒険と栄光",
soul:"未知の海に漕ぎ出すとき、あなたの魂は怖れではなく歓びで震えている。その震えこそが、あなたが本当に生きている証。",
upright:"今、あなたの前に新しい冒険の扉が開かれています。まだ見ぬ世界への一歩は、不安と同時にワクワクする高揚感をもたらしてくれるはずです。その高揚感を信じてください。あなたにはこれまでの旅で培った力があり、どんな波にも乗りこなす知恵があります。冒険の先には、あなたが想像する以上の栄光が待っています。今日、心が躍る方へ舵を切ってみてください。",
reversed:"冒険への準備は、あなたが思っている以上に整っています。もし出発を迷っているなら、それは怖いからではなく、今いる場所をそれだけ大切に築いてきた証。でも魂は、あなたがもっと広い海を知っていることを覚えています。一氣に飛び出す必要はありません。今日できる小さな冒険、いつもと違う道を歩く、新しい何かに触れる、それだけで十分です。その小さな一歩が、やがて大きな航海へと繋がっていきます。",
affirmation:"「私は未知の世界を楽しむ力がある」\n「冒険の先に、私の栄光が輝いている」",
elements:[  {name:"マーメイド",meaning:"二つの世界を行き来する自由と、未知への好奇心"},
  {name:"船",meaning:"新たな旅立ちと、自らの意志で進む航海の象徴"},
  {name:"孔雀",meaning:"本来の美しさを堂々と開く誇りと、栄光の輝き"},
  {name:"シトリン",meaning:"太陽のような明るさと、豊かさを引き寄せる黄金の光"}],imageUrl:"https://www.dropbox.com/scl/fi/j4p68srj6sss1ihcuotzf/oracleapp_12.png?rlkey=lya403lcmwoshep4g4vc1lb69&st=3vec2ty3&raw=1"},

{id:13,en:"Purity and Familial Love",ja:"純真と家族愛",
soul:"かつて子どもだった頃の、あの純粋な眼差しを覚えていますか。世界が輝いて見えたあの感覚は、今もあなたの中に息づいている。",
upright:"今、家族や大切な人との間に、あたたかい愛の循環が生まれています。それは特別なイベントの中だけでなく、何氣ない日常のひとこま、一緒にごはんを食べる時間、ふとした笑い声、そんな瞬間の中に宿っています。純粋な心で目の前の人を見つめてみてください。当たり前だと思っていた風景の中に、かけがえのない宝物が隠れています。",
reversed:"家族や身近な人との間で、すれ違いやもどかしさを感じていませんか？それはあなたが、その関係を心から大切にしているからこそ感じる痛みです。完璧な家族である必要はありません。お互いに不完全なまま愛し合えることが、家族の本当の強さです。今日は「ありがとう」や「大好きだよ」を、照れずに言ってみてください。その一言が、固くなった空氣をやわらかく溶かしていきます。",
affirmation:"「私は純粋な心で、愛を見つめる」\n「私の周りには、あたたかい愛がある」",
elements:[  {name:"子ども",meaning:"純真無垢な魂と、世界を信じる力"},
  {name:"道",meaning:"家族と共に歩む人生の旅路と、魂の約束"},
  {name:"ゾウ",meaning:"家族の絆を守る深い愛情と、記憶を大切にする知恵"},
  {name:"ブルーサファイア",meaning:"誠実さと真心、揺るがない愛の結晶"}],imageUrl:"https://www.dropbox.com/scl/fi/su3x11w9vdmsxry696r7x/oracleapp_13.png?rlkey=tq7qdzuzscjin6nxtk944yw63&st=q5w2qhi5&raw=1"},

{id:14,en:"New Beginnings and Receptivity",ja:"新たな始まりと受容力",
soul:"すべての偉大な始まりは、小さな「受け取る」から生まれる。あなたが心を開いた瞬間、宇宙は新しい物語を書き始める。",
upright:"今、あなたの人生に新しいサイクルが始まろうとしています。それは大きな変化として現れるかもしれないし、日常のふとした瞬間に静かに芽吹くものかもしれません。大切なのは、やってくるものに対して心を開いていること。「まだ準備ができていない」と感じても、宇宙のタイミングはいつも完璧です。受け取る姿勢でいるだけで、必要なものは自然とあなたのもとに届きます。",
reversed:"新しい始まりは、もうあなたのすぐ目の前に来ています。もし変化への不安を感じているなら、それは変化がすでに始まっている証。赤ちゃんが何の条件もなく愛を受け取るように、あなたにもそのままで受け取る権利があります。今日は、誰かの好意や褒め言葉を「ありがとう」とそのまま受け止めてみてください。その小さな受容が、新しい物語の最初のページを開きます。",
affirmation:"「私は新しい始まりを受け入れる」\n「私は宇宙からの贈り物を、素直に受け取ります」",
elements:[  {name:"赤ちゃん",meaning:"無条件に愛される存在と、まっさらな可能性"},
  {name:"Fruit of Life",meaning:"生命の設計図と、宇宙に組み込まれた完全なる秩序"},
  {name:"ネズミ",meaning:"小さくても賢く機敏な行動力と、豊かさを蓄える本能"},
  {name:"耳",meaning:"内なる声と宇宙のささやきを受け取る感受性"}],imageUrl:"https://www.dropbox.com/scl/fi/ta1umhh8lttl5vu2qncfg/oracleapp_14.png?rlkey=8izsyl24k8h7xstmwrfzsanlr&st=ioljcile&raw=1"},

{id:15,en:"Authority and Unity",ja:"権威と結束",
soul:"あなたの中には、人を導く光がある。それは誰かの上に立つ力ではなく、隣に立って共に輝くことを選べる、魂の成熟。",
upright:"今、あなたにはリーダーシップを発揮するタイミングが訪れています。それは偉そうにすることではなく、自分の信念を誠実に示し、周りの人がそれぞれの力を発揮できるよう場を整えること。あなたの言葉や姿勢は、人の心を動かす力を持っています。一人で全部やる必要はありません。信頼して任せることもまた、美しいリーダーシップの形です。",
reversed:"あなたのリーダーシップは、もう芽を出し始めています。周りの人の氣持ちを繊細に感じ取れるあなただからこそ、人の心に響く導き方ができるのです。全員に合わせる必要はありません。まずはあなた自身の軸をしっかり感じてください。あなたが自分の真ん中にいるとき、自然と周りもまとまっていきます。あなたらしいリーダーシップの形は、もうすぐ見えてきます。",
affirmation:"「私は私らしい光で、人と共に歩む」\n「私の誠実さが、人を繋ぐ力になる」",
elements:[  {name:"王様",meaning:"魂の成熟と、愛をもって導くリーダーシップ"},
  {name:"双子",meaning:"二つの力が一つになる統合と、鏡のような深い共鳴"},
  {name:"白いハト",meaning:"平和の使者と、争いを超えた結束の象徴"},
  {name:"ダイヤモンド",meaning:"どんな圧力にも輝きを失わない、不変の強さと価値"}],imageUrl:"https://www.dropbox.com/scl/fi/lxijz2ohvxhvm1j4irl0z/oracleapp_15.png?rlkey=yll3x52estgen665uu3t6pj6j&st=8jkej7t3&raw=1"},

{id:16,en:"Overcoming Change and Constraints",ja:"変化と制約の克服",
soul:"あなたを縛るものの正体は、外側にあるように見えて、実はあなた自身の中にある古い物語かもしれない。その物語を書き換える魔法は、あなたの手の中に。",
upright:"今、変化の風があなたに吹いています。制約や限界だと思っていたものが、実は次のステージへの扉だったと氣づくタイミングです。今まで「無理だ」と思っていたことに、もう一度目を向けてみてください。状況は変わり始めています。古いパターンを手放し、新しいやり方を試す勇氣が、あなたを自由な場所へと導きます。",
reversed:"変わりたいのに変われない、抜け出したいのに抜け出せない。そんなもどかしさの中にいませんか？それは変化を恐れているのではなく、今までの自分を否定したくないという優しさかもしれません。変化は過去の自分を捨てることではなく、今までの自分に新しいページを加えること。焦らなくていい。鎖はすでに緩み始めています。あなたが「変わってもいい」と自分に許可を出した瞬間、魔法は動き出します。",
affirmation:"「私は古い制約を超えていく」\n「変化は、私を自由にしてくれる」",
elements:[  {name:"魔女",meaning:"見えない力を味方にする知恵と、現実を変容させる魔法"},
  {name:"鎖",meaning:"束縛と解放の両面、断ち切ることで生まれる新たな力"},
  {name:"トンボ",meaning:"変容と適応の象徴、軽やかに次元を行き来する存在"},
  {name:"六角形",meaning:"構造的な安定と、自然界の完璧な調和のパターン"}],imageUrl:"https://www.dropbox.com/scl/fi/bq70yxyte9wyvgkk1gw29/oracleapp_16.png?rlkey=5ddgtyswx6t6l8zn8fpvu01b6&st=8dtuco6s&raw=1"},

{id:17,en:"Knowledge and Expansion",ja:"知識と拡大",
soul:"知ることへの渇望は、あなたの魂が広がろうとしているサイン。一つの知識が新しい扉を開き、その扉の向こうにまた無限の宇宙が広がっている。",
upright:"今、あなたの知的好奇心が高まっています。学びたい、知りたい、もっと深く理解したいというその衝動を、どうか大切にしてください。本を読むこと、誰かの話を聴くこと、新しいスキルに挑戦すること。そのすべてが、あなたの世界を拡げていきます。知識は力ではなく翼です。あなたの翼はいま、大きく広がろうとしています。",
reversed:"あなたが今まで積み重ねてきた知識は、もうすぐ一つの大きな絵として繋がろうとしています。もし「まだ足りない」「まだ動けない」と感じているなら、それはあと少しの辛抱。完璧に理解してから動こうとしなくていい。70％の理解で一歩踏み出すことが、残りの30％を教えてくれます。知識は使ってこそ、あなたの中で本当の叡智へと変わっていきます。",
affirmation:"「私の好奇心が、世界を広げていく」\n「学ぶことが、私の翼になる」",
elements:[  {name:"お姫様",meaning:"内なる氣品と、知恵によって輝く高貴な魂"},
  {name:"キャンドル",meaning:"闇を照らす知識の光と、真理を求める静かな炎"},
  {name:"カラス",meaning:"深い知性と、隠された真実を見抜く鋭い観察眼"},
  {name:"木星",meaning:"拡大と幸運、学びを通じて人生を豊かにする恩恵の星"}],imageUrl:"https://www.dropbox.com/scl/fi/0kpp6wf40rvby5qy97ydt/oracleapp_17.png?rlkey=j8lm9wmglz79c6ogpbled0rlc&st=uya1als4&raw=1"},

{id:18,en:"Refinement and Sensitivity",ja:"洗練と感受性",
soul:"繊細であることは、あなたの弱さではなく最も美しい強さ。その感受性が、他の誰にも見えないものを感じ取り、世界に新しい美しさを映し出す。",
upright:"今、あなたの感性が研ぎ澄まされています。音楽、色、言葉、空氣、そのすべてをいつもより深く感じ取れる時期です。その繊細さを活かして、身の回りのものを一つひとつ丁寧に選んでみてください。自分が本当に心地よいと感じるものに囲まれることで、あなたの内側からさらに美しい輝きが生まれます。洗練とは、余計なものを手放し、本質だけを残すこと。あなたはいま、その美しいプロセスの中にいます。",
reversed:"感じすぎて疲れてしまっていませんか？人の氣持ちや場のエネルギーを拾いすぎて、自分の感覚がどれなのか分からなくなっているのかもしれません。それはあなたの感受性がそれだけ豊かだという証。でも今は、自分を守る時間も必要です。静かな場所で深呼吸をして、「これは私のもの？それとも誰かのもの？」と自分に問いかけてみてください。自分の感覚を取り戻すことで、繊細さは再びあなたの味方になります。",
affirmation:"「私の繊細さは、美しい強さ」\n「私は自分の感性を信じ、大切にする」",
elements:[  {name:"王子様",meaning:"高い理想と、繊細さの中に宿る氣高い精神"},
  {name:"ヘビ",meaning:"脱皮による再生と、古い自分を脱ぎ捨てる洗練の力"},
  {name:"海王星",meaning:"夢と直感の星、見えない世界と繋がる感受性の源"},
  {name:"雨",meaning:"浄化と恵み、感情を洗い流し大地を潤す天からの贈り物"}],imageUrl:"https://www.dropbox.com/scl/fi/e962tfq24mlie7r8cnw07/oracleapp_18.png?rlkey=ltyxnx81e3vbs7dqtuuclhvo1&st=wvy2o0mp&raw=1"},

{id:19,en:"Instinct and Opportunity",ja:"本能と好機",
soul:"チャンスは、論理より先に体が反応する。あなたの本能が「今だ」と告げる瞬間を見逃さないで。それは宇宙があなただけに送ったサイン。",
upright:"今、あなたの周りにチャンスの扉が現れています。それは目立つ形ではなく、ふとした会話の中に、偶然目にした情報の中に、何氣ない日常の隙間に隠れているかもしれません。頭で「条件が揃ってから」と考えるより、体が反応する感覚を信じてみてください。あなたの本能は、理屈よりもずっと正確にチャンスを嗅ぎ分けます。ゲートが開いている今、思い切って飛び込んでみてください。",
reversed:"チャンスの扉は、もうあなたの手の届くところにあります。あとは、そっとノブに手をかけるだけ。「本当にこれでいいのか」と思考でかき消してしまいそうなときこそ、体の感覚に耳を傾けてみてください。胸が熱くなる方、ワクワクする方。それがあなたの魂が指し示す方角です。考えすぎなくて大丈夫。あなたの本能は、もう答えを知っています。",
affirmation:"「私の本能は、最高のナビゲーター」\n「チャンスの扉は、今ここに開いている」",
elements:[  {name:"魔法使い",meaning:"意図と行動で現実を創り出す、顕現の達人"},
  {name:"ゲート",meaning:"次元を超えた好機の入り口と、決断の瞬間"},
  {name:"トラ",meaning:"研ぎ澄まされた本能と、最適なタイミングを待つ力"},
  {name:"ザクロ",meaning:"豊穣の実りと、一つの行動から広がる無数の可能性"}],imageUrl:"https://www.dropbox.com/scl/fi/ihke45bg1hrsw9dmo0aju/oracleapp_19.png?rlkey=h1g9fij90sevox0r4cbor0tdr&st=m087pf9u&raw=1"},

{id:20,en:"Self-Worth and Charm",ja:"自己価値と魅力",
soul:"あなたの価値は、誰かに認められて初めて生まれるものではない。あなたが存在しているだけで、すでにこの宇宙にとってかけがえのない光。",
upright:"今、あなたの内側から自然な魅力が輝き出しています。それは何かを「頑張って」身につけたものではなく、あなたがあなたらしくいることで自然と溢れてくるもの。自分の価値を低く見積もるのは、今日でおしまいにしましょう。あなたが自分を大切に扱うほど、世界もあなたを大切に扱い始めます。鏡を見て「今日も素敵だね」と声をかけてみてください。その言葉が、あなたの魅力をさらに引き出します。",
reversed:"あなたの本来の魅力は、もう表面に出てこようとしています。もし今、誰かと比べて自分を小さく感じているなら、それはあなたの光がまもなく大きく輝く前の、最後の曇り空のようなもの。自分が自分に対して一番の味方になってあげてください。今日一日、自分を批判する言葉を一切やめてみる。それだけで、あなた本来の魅力が内側から蘇ってきます。",
affirmation:"「私はそのままで、十分に価値がある」\n「私の魅力は、私らしくいることで輝く」",
elements:[  {name:"王女様",meaning:"自分自身の価値を知り、内側から輝く女性性の力"},
  {name:"ヤモリ",meaning:"環境に適応しながらも自分を失わない、しなやかな生存力"},
  {name:"円",meaning:"完全性と調和、始まりも終わりもない永遠の全体調和"},
  {name:"金星",meaning:"愛と美と豊かさの星、自分を愛することで放たれる光"}],imageUrl:"https://www.dropbox.com/scl/fi/6apf0mvq6kiik7ocuosv9/oracleapp_20.png?rlkey=5r31x8ela4xowec000skqv9hu&st=49sfu7dq&raw=1"},

{id:21,en:"Truth and Spiritual Alchemy",ja:"真理と魂の錬金術",
soul:"あなたの人生で起きたすべてのこと、喜びも痛みも、すべてが黄金に変わる素材。その錬金術師は他の誰でもない、あなた自身。",
upright:"今、あなたの中で深い変容が起きています。過去の経験や感情が、新しい意味を持って生まれ変わろうとしています。かつては辛かったことが、今の自分の強さの源だったと氣づく瞬間が訪れるかもしれません。あなたの魂は、すべてを叡智に変える力を持っています。目の前の真実から目を逸らさないでください。真実を見つめることが、魂の錬金術の始まりです。",
reversed:"まだ消化しきれていない過去の痛みや、向き合うのが怖い真実がありますか？それを無理にこじ開ける必要はありません。錬金術には、適切な温度と時間が必要です。今はただ、「いつか必ずこれも黄金に変わる」と信じてください。あなたの魂はすでにその準備を始めています。焦らず、自分のペースで。すべてのプロセスに、意味があります。",
affirmation:"「私のすべての経験が、黄金に変わっていく」\n「私は真実を見つめる強さを持っている」",
elements:[  {name:"女教皇",meaning:"見えない真理を読み解く力と、スピリチュアルな叡智の守護者"},
  {name:"歯車",meaning:"目に見えない法則で動く宇宙の仕組みと、完璧なるタイミング"},
  {name:"蜂",meaning:"勤勉さと集合意識、小さな努力が生む甘い実りの象徴"},
  {name:"冥王星",meaning:"死と再生、根本からの変容と魂の深い浄化を司る星"}],imageUrl:"https://www.dropbox.com/scl/fi/sbkmn608uj83mfz1d1s28/oracleapp_21.png?rlkey=2v7mldi2pjx2lty5o7ol514yu&st=9nv82z8h&raw=1"},

{id:22,en:"Progress and Exploring the Unknown",ja:"進歩と未知の探求",
soul:"まだ地図にない場所へ足を踏み入れるとき、あなたは道を歩いているのではない。道そのものを、創っている。",
upright:"今、あなたの人生は新しいフェーズに入ろうとしています。今までのやり方がしっくりこなくなっているなら、それは退化ではなく進化のサインです。未知の領域に踏み出すことに完璧な地図は必要ありません。一歩進むごとに、次の景色が見えてきます。あなたの好奇心と直感を信じて、まだ見ぬ世界へ歩み出してください。その探求の中にこそ、あなたの魂が求めていた答えがあります。",
reversed:"実はあなたは、思っている以上に前に進んでいます。立ち止まっているように見えるこの時間も、進歩は螺旋のように確実に起きています。時に後ろを振り返ったり、横道に逸れたりすることも、すべて旅の一部。今日は「わからない」を楽しんでみてください。未知を怖れずに眺めるだけで、次の一歩は自然と見えてきます。",
affirmation:"「私は未知を楽しみながら進化していく」\n「私の一歩が、新しい道を創り出す」",
elements:[  {name:"少女",meaning:"恐れを知らない純粋な探求心と、新しい世界への期待"},
  {name:"四角形",meaning:"安定した土台の上に建てる、着実な進歩の象徴"},
  {name:"家",meaning:"心の拠り所と安心感、どこへ旅しても帰れる場所があるという信頼"},
  {name:"天王星",meaning:"突然の変革と革新、既存の枠を超えた自由な発想の星"}],imageUrl:"https://www.dropbox.com/scl/fi/t7wswkpflxcx0j5of419o/oracleapp_22.png?rlkey=exf9pv0etj4s6xa8m88g32ad2&st=srxnpg9q&raw=1"},

{id:23,en:"Goals and Insight",ja:"目標と洞察",
soul:"的を射るために必要なのは、力ではなく静けさ。心が澄み切った瞬間、あなたの矢は自ずと真ん中を射抜く。",
upright:"今、あなたの中で何かが定まろうとしています。まだはっきり言葉にできなくても、心の奥で「こっちだ」と感じる感覚があるなら、それはあなたの目標が形を取り始めているサインです。すでに明確なビジョンがあるなら、それは答え合わせ。大切なのは、遠くのゴールばかりを見つめるのではなく、今日できる一つの行動に集中すること。直感が「ここだ」と指す方向に、迷わず矢を放ってください。その矢は必ず、あなたにとって最善の場所に届きます。",
reversed:"目標を見失って、どこに向かっているのか分からなくなっていませんか？あるいは、目標はあるのに達成できない自分を責めてしまっているのかもしれません。一度、「こうあるべき」という目標をすべて手放してみてください。本当にあなたの魂が望んでいることは、頭で考えた目標とは違う場所にあるかもしれません。静かに目を閉じて、心の奥で光っているものを感じてみてください。それがあなたの本当の的です。",
affirmation:"「私の直感が、最善の的を示してくれる」\n「私は自分のビジョンを信じて進む」",
elements:[  {name:"天使",meaning:"高次からの導きと、目標達成を見守る神聖なサポート"},
  {name:"弓矢",meaning:"集中力と明確な意図、狙い定めて放つ決断の力"},
  {name:"クロヒョウ",meaning:"闇の中でも目標を見失わない鋭い洞察力と、静かなる力強さ"},
  {name:"ブドウ",meaning:"一粒一粒の努力が実る豊穣と、忍耐の末に訪れる甘い成果"}],imageUrl:"https://www.dropbox.com/scl/fi/e2131u6uhmajvo5bxzvkn/oracleapp_23.png?rlkey=js9rjx529vq9meva0jga4n0r5&st=bwzxxom3&raw=1"},

{id:24,en:"Stability and Natural Rhythm",ja:"安定と自然のリズム",
soul:"大地に深く根を張る木のように、あなたの安定は外側の条件ではなく、内側の静けさから生まれる。",
upright:"今、あなたの人生に穏やかな安定のエネルギーが流れています。派手な変化はなくても、日々の積み重ねがあなたの土台をしっかりと支えています。自然には自然のリズムがあるように、あなたにもあなただけの季節とペースがあります。誰かのリズムと比べなくていい。今のあなたのペースこそが、あなたにとっての最善のリズムです。そのリズムを信じて、今日も一歩を重ねてください。",
reversed:"あなたの安定は、目に見えないところで着実に育っています。今感じている焦りや不安は、根が深く伸びている最中のサイン。地上からは見えなくても、あなたの土台は日に日に強くなっています。周りのペースと比べなくて大丈夫。あなたにはあなたのリズムがある。今は足元を整えることに意識を向けてみてください。安定した根があれば、いつでも力強く伸びていけます。",
affirmation:"「私は自分のリズムで、着実に育っている」\n「私の土台は、揺るがない安心の上にある」",
elements:[  {name:"天使",meaning:"日常を静かに守護する天からの見えない支え"},
  {name:"根",meaning:"見えない場所で育つ強さと、すべてを支える生命の基盤"},
  {name:"鹿",meaning:"穏やかさの中に宿る優美な強さと、自然と共に生きる知恵"},
  {name:"レモン",meaning:"すっきりとした浄化の力と、日常の中に見つける爽やかな恵み"}],imageUrl:"https://www.dropbox.com/scl/fi/edck2nmh4n5hmhmakiet0/oracleapp_24.png?rlkey=qyt8gc085bs4wzwyhqfjuqk86&st=wp71y6s0&raw=1"},

{id:25,en:"Nurture and Agility",ja:"育成と敏捷性",
soul:"あなたが愛を注いで育てているものは、氣づかないうちに、あなた自身をも育てている。育てることと育つことは、同じ一つの魔法。",
upright:"今、あなたが大切に育てているもの、人、プロジェクト、夢、あるいは自分自身、そのすべてが順調に成長しています。完璧な育て方を知らなくても大丈夫。愛情を注ぎながらも、柔軟に対応する軽やかさを持ってください。ウサギのように素早く状況を読み、必要な時にサッと方向を変えられるしなやかさが、今のあなたの武器です。育てる喜びを、存分に味わってください。",
reversed:"誰かや何かの世話に追われて、自分自身を育てることを忘れていませんか？与えることに夢中になるあまり、自分のランタンの灯りが小さくなっているかもしれません。ちょっと立ち止まって、あなたの心のコップを見てみてください。空っぽになっていませんか？今日はまず、自分自身に優しくする時間を作ってください。あなたが満たされることで、周りに注ぐ愛もまた豊かになります。",
affirmation:"「私は育てることで、私自身も育っていく」\n「しなやかさが、私の最高の強さ」",
elements:[  {name:"天使",meaning:"成長を見守る慈愛と、必要な時に差し伸べられる天の導き"},
  {name:"ランタン",meaning:"暗闇の中でも道を照らす希望と、育む者の内なる光"},
  {name:"ウサギ",meaning:"敏捷性と豊穣、直感で危険を察知し好機を掴む本能"},
  {name:"大木",meaning:"長い時間をかけて育つ生命の偉大さと、多くの命を育む包容力"}],imageUrl:"https://www.dropbox.com/scl/fi/jm3bei1s6jfudcgrobf00/oracleapp_25.png?rlkey=skg1rxgla9h7t5kayqhbabdwe&st=2lhhw9ij&raw=1"},

{id:26,en:"Celebration and Communication",ja:"祝祭とコミュニケーション",
soul:"言葉は、魂から魂へと光を届ける翼。あなたの声が誰かの心に触れたとき、そこに小さな祝祭が生まれる。",
upright:"今、あなたのコミュニケーションに祝福のエネルギーが宿っています。あなたの言葉は、あなたが思っている以上に人の心を動かしています。遠慮せず、感じたことを素直に伝えてみてください。目の前の人との会話はもちろん、SNSやブログなどを通じて、あなたの想いを言葉にして届けてみるのも今のタイミングにぴったりです。画面の向こうにも、あなたの言葉を待っている人がいます。喜びを分かち合う小さな言葉の交換が、日常を祝祭に変えていきます。",
reversed:"言いたいことがうまく伝わらない、あるいは本音を言えないもどかしさを感じているのかもしれません。そんなときは、まず自分自身とのコミュニケーションを見直してみてください。「私は本当はどう感じている？」「私が本当に伝えたいことは何？」と、自分の内側に静かに問いかけてみる。自分の氣持ちがクリアになると、他者への言葉も自然と変わってきます。内なる自分との対話が整ったとき、外の世界とのコミュニケーションにも祝祭のエネルギーが戻ってきます。",
affirmation:"「私の言葉が、人の心に光を届ける」\n「喜びを分かち合うことで、世界はもっと輝く」",
elements:[  {name:"天使",meaning:"天からのメッセージを届ける使者と、言葉に宿る聖なる力"},
  {name:"シャンパングラス",meaning:"人生の節目を祝う喜びと、溢れ出す豊かさの泡"},
  {name:"羊",meaning:"穏やかさと群れの調和、共にいることで生まれるあたたかさ"},
  {name:"水星",meaning:"コミュニケーションと知性の星、言葉と思考を司る光"}],imageUrl:"https://www.dropbox.com/scl/fi/uf7kbwcckipq9d53dhvmj/oracleapp_26.png?rlkey=6vtlvervkpn68o9zgpl573luz&st=gx1qisry&raw=1"},

{id:27,en:"Divine Protection and Good Omen",ja:"高次の加護と瑞兆",
soul:"あなたが見つけた幸運のサインは、偶然ではない。それは宇宙があなたに「大丈夫、見守っているよ」と送った光の手紙。",
upright:"今、あなたは高次の存在たちから強く守られています。ふとした瞬間に感じる安心感、繰り返し目にする数字やシンボル、なぜか心が軽くなる出来事。それらはすべて、あなたへの瑞兆、良いことが起きるサインです。この守りの中にいることを信じて、安心して前に進んでください。あなたの祈りは届いています。そして、その答えはすでに届き始めています。",
reversed:"高次からの守りは、今もあなたのすぐそばにあります。たとえ辛い出来事が続いて実感が湧かなくても、嵐の中でも灯台の光は消えていません。このカードが出たこと自体が、宇宙からの「大丈夫だよ」というサイン。今日は空を見上げて、深呼吸してみてください。「私は守られている」と声に出すだけで、その光との繋がりが再び感じられるようになります。",
affirmation:"「私はいつも、高次の愛に守られている」\n「幸運のサインは、私のもとに届いている」",
elements:[  {name:"妖精",meaning:"自然界と高次の世界を繋ぐ存在と、目に見えない祝福の運び手"},
  {name:"十字架",meaning:"天と地を結ぶ聖なる交差点と、守護の強い意志"},
  {name:"雷",meaning:"瞬間的な閃きと目覚め、天からの力強いメッセージ"},
  {name:"地球",meaning:"すべての生命を育む母なる星と、グラウンディングの源"}],imageUrl:"https://www.dropbox.com/scl/fi/zuajpwbsh234xt1y76jue/oracleapp_27.png?rlkey=o3t72swqx7zt3n0ck77uipodi&st=t385eruq&raw=1"},

{id:28,en:"Passion and Transformation",ja:"情熱と変容",
soul:"情熱は、魂に灯された聖なる火。その炎は古い自分を焼き尽くしながら、まだ見ぬ美しいあなたを生み出していく。",
upright:"今、あなたの内側で情熱の炎が燃え上がっています。何かに夢中になれる氣持ち、胸の奥が熱くなる感覚、それこそがあなたの魂が「本当に望んでいること」を教えてくれるサインです。その情熱を恐れず、全身で感じてみてください。蝶が蛹の中で完全に形を変えるように、今のあなたも大きな変容の只中にいます。変わることを楽しんでください。生まれ変わった先には、想像以上の美しさが待っています。",
reversed:"情熱を感じられなくなっていたり、燃え尽きたような感覚がありませんか？あるいは、変わりたいのに何かが邪魔をしていると感じるのかもしれません。その疲れや停滞は、次の変容のための充電期間です。火は消えたのではなく、熾火として静かに灯り続けています。今は無理に燃え上がろうとしなくていい。自分が「好き」と思える小さなことから、もう一度火種を集めてみてください。",
affirmation:"「私の情熱が、私を新しい姿に変えていく」\n「変容の先に、もっと美しい私が待っている」",
elements:[  {name:"妖精",meaning:"変容の魔法を司る存在と、自然界の循環を見守る精霊"},
  {name:"火星",meaning:"情熱と行動力の星、内なる戦士のエネルギーの源"},
  {name:"蝶",meaning:"完全なる変容の象徴、美しく生まれ変わる魂のプロセス"},
  {name:"イチジク",meaning:"豊かな実りと官能、生命のエネルギーを満たす聖なる果実"}],imageUrl:"https://www.dropbox.com/scl/fi/rt90tij0kzb4wusjygwc2/oracleapp_28.png?rlkey=pdd90ru0oijqqoxgf45j3qxd8&st=polvcbm8&raw=1"},

{id:29,en:"Playfulness and Manifestation",ja:"遊び心と現実化",
soul:"宇宙は、眉間にしわを寄せた祈りより、笑顔で放った願いに先に応える。遊ぶように夢を描くとき、現実はあなたの想像を超えて動き出す。",
upright:"今、あなたの願いが現実になり始めています。ただし、その鍵は「頑張る」ではなく「楽しむ」こと。遊び心を忘れずにいると、宇宙はあなたの創造力に呼応して、思いもよらない形で夢を届けてくれます。深刻になりすぎず、子どものように「こうなったら楽しいな」と想像してみてください。その軽やかなエネルギーが、最も強力な現実化の魔法です。",
reversed:"あなたの夢の現実化は、もう動き始めています。ただし今、少しだけ力みが入りすぎているかもしれません。握りしめた手をそっと開いてみてください。現実化は、力んでいるときよりもリラックスしているときの方が、ずっとスムーズに進みます。純粋に今を楽しむことに意識を戻してみて。遊び心を取り戻した瞬間、止まっていた歯車が再び回り始めます。",
affirmation:"「遊ぶように夢を描くと、宇宙が応えてくれる」\n「私の軽やかさが、現実を創っていく」",
elements:[  {name:"妖精",meaning:"遊びと創造の境界を溶かす存在と、イマジネーションの守護者"},
  {name:"Flower of Life",meaning:"宇宙の創造の設計図と、すべての生命に共通する聖なるパターン"},
  {name:"手",meaning:"意図を現実に変える創造の力と、受け取り、そして与える器"},
  {name:"土星",meaning:"形を与え、夢を構造化する力、時間をかけた確かな実現の星"}],imageUrl:"https://www.dropbox.com/scl/fi/1xrnf5yapech7sxi4ljpt/oracleapp_29.png?rlkey=z8i556j7bctomocmdxy73hq86&st=p6mx2u5s&raw=1"},

{id:30,en:"Clear Vision and Ascending Power",ja:"明晰なヴィジョンと上昇の力",
soul:"あなたの魂の目は、霧の向こうにある真実をすでに見ている。その明晰さを信じるとき、あなたは自らの翼で天へと昇っていく。",
upright:"今、あなたの内なるヴィジョン——心の目で感じる「こうなっていく」という未来の感覚——がかつてないほどクリアになっています。進むべき方向、手放すべきもの、大切にすべきこと、そのすべてが心の目にはっきりと映し出されています。この洞察力を活かして、今こそ一段上のステージへ進むときです。上弦の月のように満ちていく力があなたを後押ししています。自分の可能性を信じて、次のステージへ一歩踏み出してください。",
reversed:"先が見えず、どこに向かっているのか分からなくなっていませんか？ヴィジョンが曇っているように感じるのは、外側のノイズが多すぎるサインかもしれません。今は無理にクリアさを求めず、まずは心の中を整理する時間を取ってみてください。瞑想、散歩、自然の中で過ごす時間、何でもいいのです。霧が晴れたとき、あなたの目の前には今まで以上に広い景色が広がっているはずです。",
affirmation:"「私のヴィジョンは、澄み渡っている」\n「私は今、一段上のステージへ昇っていく」",
elements:[  {name:"妖精",meaning:"高い視点から真実を見渡す存在と、精神世界への案内人"},
  {name:"五角形",meaning:"人間の身体と宇宙の調和、霊的な完成と守護のシンボル"},
  {name:"上弦の月",meaning:"満ちゆく力と成長、ヴィジョンが現実に向かう上昇のエネルギー"},
  {name:"目",meaning:"第三の目、真実を見抜くスピリチュアルな洞察力と明晰さの象徴"}],imageUrl:"https://www.dropbox.com/scl/fi/bj2cnrrz012832amlko4r/oracleapp_30.png?rlkey=jlvu5e3lvpqx0vve0nhf22ju0&st=u4dm13rg&raw=1"},

{id:31,en:"Soul Clearing and Prosperity",ja:"魂のクリアリングと繁栄",
soul:"心の奥に積もった塵を祓い清めたとき、そこに最初から在った黄金の光が姿を現す。繁栄とは外からやってくるものではなく、クリアになった内側から溢れ出たものに呼応して、自然と広がっていくエネルギー。",
upright:"今、あなたの魂は深いクリアリングの時を迎えています。不要な思い込みや古い感情が浄化されるほど、あなたの内側から放たれるエネルギーの純度が上がり、それが周りの現実にも繁栄として映し出されていきます。お香の煙が空氣を清めるように、今日は心の中の「もう要らないもの」を一つだけ手放してみてください。手放すたびに、あなたの光はより純粋に、より遠くまで届くようになります。",
reversed:"内側のクリアリングは、もうほとんど完了に近づいています。もし今「自分には豊かさが来ない」と感じているなら、それは流れが滞っているのではなく、最後の一枚のフィルターが外れようとしているタイミング。今日は自分の中の「私なんかが」「まだ足りない」という声に氣づいてみてください。その声に氣づくだけで、フィルターは自然と溶け始めます。クリアになったあなたの内側から、思いがけない繁栄が広がっていきます。",
affirmation:"「私の魂はクリアで、豊かさが溢れ出します」\n「私は繁栄を創り出す力がある」",
elements:[  {name:"観音菩薩",meaning:"無条件の慈悲と、すべての苦しみを癒す大いなる愛"},
  {name:"お香",meaning:"聖なる空間を整える浄化の煙と、祈りを天へ届ける架け橋"},
  {name:"金魚",meaning:"豊かさと幸運を呼び込む吉祥の象徴、流れの中で輝く生命"},
  {name:"八角形",meaning:"宇宙の調和と再生、あらゆる方向からの守護と繁栄の形"}],imageUrl:"https://www.dropbox.com/scl/fi/axackq7stdo447jp2r2qz/oracleapp_31.png?rlkey=kx8v0d5hw9e1ibdttxghko6r1&st=vficg50d&raw=1"},

{id:32,en:"New World and Promise",ja:"新たな世界と約束",
soul:"夜が明ける直前が最も暗いように、新しい世界の扉はいつも、古い世界が終わるその瞬間に開く。朝日が昇るように、あなたの新しい始まりはもう、地平線に姿を見せている。",
upright:"今、あなたの目の前に新しい世界が広がり始めています。それはかつて魂が約束した場所かもしれません。虹が嵐のあとに現れるように、今まで乗り越えてきたすべてのことが、この新しい景色を見るために必要だったのです。新しい風を感じたら、恐れずにその方向へ歩み出してください。あなたの魂が交わした約束が、今、現実となって形を取ろうとしています。",
reversed:"新しい世界への移行は、もう始まっています。今もし不安や迷いを感じているなら、それは古い世界と新しい世界の境目に立っている証。過渡期は誰にとっても落ち着かないものです。でも朝日は必ず昇ります。今はただ、「新しい世界が来る」と信じて、目の前の一日を丁寧に過ごしてください。虹はあなたのすぐ先に、もう架かり始めています。",
affirmation:"「新しい世界が、私を迎えてくれている」\n「私の魂の約束が、今、叶い始める」",
elements:[  {name:"青龍",meaning:"東の守護者として新しい始まりを告げる、創造と成長の龍"},
  {name:"鳥の羽根",meaning:"天からのメッセージと、魂が軽やかに次の世界へ羽ばたく自由"},
  {name:"朝日",meaning:"新しい一日と新しい始まりの象徴、希望に満ちた光の到来"},
  {name:"虹",meaning:"嵐のあとに現れる祝福の架け橋、約束が果たされるサイン"}],imageUrl:"https://www.dropbox.com/scl/fi/jihlxy06hhqck9qqvsv16/oracleapp_32.png?rlkey=sw1e422ddcnzds6h60hol62em&st=glhv24pz&raw=1"},

{id:33,en:"Fusion of Love and Abundance",ja:"愛と豊かさの融合",
soul:"愛と豊かさは別々のものではなく、同じ一つの泉から湧き出ている。あなたが愛に満たされるとき、豊かさもまた自然とあなたのもとに流れてくる。",
upright:"今、あなたの人生で愛と豊かさが美しく融合し始めています。愛を注ぐことで豊かさが生まれ、豊かさを受け取ることでさらに愛が深まる。その循環があなたの中で回り始めています。自分が心から愛するものに時間とエネルギーを注いでみてください。それが結果として、思いがけない形で豊かさとなって戻ってきます。夕日のように温かく、赤いバラのように情熱的に、今日という一日を愛で満たしてください。",
reversed:"愛か豊かさか、どちらかを選ばなければいけないと思い込んでいませんか？「好きなことでは食べていけない」「お金を稼ぐには好きなことを犠牲にしなければ」そんな古い信念が残っているかもしれません。でも、それはもう手放していい思い込みです。愛と豊かさは対立するものではなく、本来セットで訪れるもの。まずは小さなことから、愛と豊かさを同時に感じられる瞬間を探してみてください。その氣づきが、二つを融合させる鍵になります。",
affirmation:"「愛と豊かさは、私の中で一つになっている」\n「私が愛を注ぐほど、豊かさが溢れてくる」",
elements:[  {name:"金龍",meaning:"富と繁栄を司る黄金の龍、愛ある行動がもたらす恩恵"},
  {name:"香水",meaning:"目に見えないけれど人を惹きつける魅力と、愛の芳香"},
  {name:"赤いバラ",meaning:"情熱的な愛と美しさ、心を開いて咲く勇氣"},
  {name:"夕日",meaning:"一日の終わりに訪れる穏やかな充足と、豊かさへの感謝"}],imageUrl:"https://www.dropbox.com/scl/fi/s0fspbhdv7rkr0gsul18p/oracleapp_33.png?rlkey=moon3e3ynob6kvgh3w2gfcwf3&st=9oq8wk3g&raw=1"},

{id:34,en:"Intuition and Completion",ja:"直感と完成",
soul:"あなたの直感は、宇宙があなただけに開いた秘密の回線。その声に従うとき、すべてのピースが一つの絵として完成する。",
upright:"今、あなたの直感力がかつてないほど冴えています。満月の光がすべてを照らし出すように、心の目で見えるものがクリアになっています。論理では説明できないけれど「こうだ」と感じること、それを信じてください。長い間取り組んできたことが完成に近づいているサインでもあります。最後のピースを置くのは、頭の判断ではなく、あなたの直感です。",
reversed:"完成まであと少しのところに来ています。もし「まだ何かが足りない」と感じるなら、それは足りないのではなく、最後の仕上げを直感に委ねる段階に入ったということ。考えすぎず、感じるままに動いてみてください。雲の向こうには満月が輝いています。その光はあなたの直感をさらに照らし、すべてを美しい完成へと導いてくれます。",
affirmation:"「私の直感が、すべてを完成に導く」\n「必要なピースは、すべて揃っている」",
elements:[  {name:"銀龍",meaning:"月の光を司る龍、直感と内なる叡智の守護者"},
  {name:"音符",meaning:"宇宙のハーモニーと、魂のリズムに調和する完成の響き"},
  {name:"満月",meaning:"すべてが照らされる完成と成就、直感が最も冴える時"},
  {name:"雲",meaning:"変化と流れ、形にとらわれない自由な直感の象徴"}],imageUrl:"https://www.dropbox.com/scl/fi/u33h84oud4bxfalurnyh0/oracleapp_34.png?rlkey=bvdakleseqtu6vl8hqtk3336k&st=mwjq5jn2&raw=1"},

{id:35,en:"Galactic Blueprint and Serendipity",ja:"銀河のブループリントとセレンディピティ",
soul:"あなたの人生に「偶然」はない。すべては銀河の設計図に沿って、完璧なタイミングで届けられている。その導きに身を委ねたとき、魔法のような出来事が動き始める。",
upright:"今、あなたの人生にセレンディピティ——幸福な偶然の一致——が起きやすくなっています。思いがけない出逢い、偶然見つけた情報、なぜかタイミングが合う出来事。それらはすべて、銀河の設計図に描かれたあなたの道筋です。コントロールしようとせず、流れに身を委ねてみてください。四葉のクローバーは探すのではなく、ふと目に留まるもの。幸運もまた、力を抜いた瞬間にあなたのもとへ飛び込んできます。",
reversed:"幸運な偶然は、もうあなたの周りで起き始めています。ただ、忙しさや思考のノイズの中で、そのサインを見落としているだけかもしれません。今日は少しだけ立ち止まって、「あれ？」と感じる小さな偶然に意識を向けてみてください。銀河の設計図は、あなたが氣づくのを静かに待っています。氣づいた瞬間から、セレンディピティの連鎖が加速していきます。",
affirmation:"「私の人生は、完璧な導きの中にある」\n「幸福な偶然が、私に味方している」",
elements:[  {name:"黒龍",meaning:"宇宙の深淵を守る龍、見えない法則と運命の流れを司る存在"},
  {name:"地図",meaning:"魂の旅路を示す設計図と、まだ見ぬ目的地への道しるべ"},
  {name:"四葉のクローバー",meaning:"稀有な幸運と、宇宙からの祝福のサイン"},
  {name:"銀河",meaning:"無限に広がる可能性と、すべてが繋がる壮大な宇宙の秩序"}],imageUrl:"https://www.dropbox.com/scl/fi/x0apiaqkjzmnziq0ijkv8/oracleapp_35.png?rlkey=s56i28eyuedibu5wlv8g2yiw7&st=hp1rnnf3&raw=1"},

{id:36,en:"Authenticity and Infinite Potential",ja:"ありのままの自分と無限の潜在力",
soul:"あなたが「こうあるべき」という仮面を外したとき、その素顔の中に、宇宙が最も愛する光が輝いている。ありのままのあなたこそが、最強の魔法。",
upright:"今、あなたの中に眠っていた潜在力が目覚め始めています。それは何か新しい能力を身につけることではなく、もともとあなたの中にあったものが表面に現れてくるプロセスです。鏡をのぞいてみてください。そこに映っているありのままのあなたが、最も美しく、最も強い。誰かの期待に応えるための姿ではなく、あなたらしい姿でいることを選んでください。その選択が、無限の潜在力を解き放つ鍵です。",
reversed:"ありのままの自分を見せることへの怖さを感じているかもしれません。「本当の自分を見せたら嫌われるのでは」という声が聞こえているなら、その声はあなたの本質ではなく、古い経験が残した保護膜です。新月の夜のように、今は何も見えなくても、その闇の中であなたの新しい光はすでに生まれ始めています。少しずつでいい。安心できる場所から、本当の自分を一つずつ表に出してみてください。",
affirmation:"「ありのままの私が、最高の私」\n「私の中の無限の力が、今ここで発揮されていく」",
elements:[  {name:"緑龍",meaning:"生命力と成長を司る龍、ありのままの姿で大地に根を張る力"},
  {name:"鏡",meaning:"真実の自分を映し出す道具と、自己認識の入り口"},
  {name:"チューリップ",meaning:"完璧な美しさと、時が来れば必ず開く潜在力"},
  {name:"新月",meaning:"まだ見えない可能性の種と、内側で静かに始まる新しいサイクル"}],imageUrl:"https://www.dropbox.com/scl/fi/orsl1k6ryam0ln8xupa6j/oracleapp_36.png?rlkey=ok1dasjejwncyam1lzo4h5gzg&st=j5snr9hi&raw=1"},

{id:37,en:"Release and Awakening Process",ja:"解放と覚醒へのプロセス",
soul:"手放すことは失うことではなく、もっと大きなものを受け取るために両手を空けること。その解放の先に、魂の覚醒が待っている。",
upright:"今、あなたは大きな解放のプロセスの中にいます。古い信念、過去の痛み、もう必要のなくなった関係やパターン。それらが一つずつ剥がれ落ちていくのを感じてみてください。ラベンダーの香りが心を鎮めるように、手放すプロセスは穏やかに進みます。階段を一段ずつ上がるように、あなたの意識は着実に覚醒へと向かっています。今は信じて、このプロセスに身を委ねてください。",
reversed:"手放したいのに、まだ握りしめているものがありませんか？それは不安や恐れからということの他にも、そこに込められた愛や想い出が深いからかもしれません。無理に手放す必要はありません。覚醒のプロセスには、その人だけの階段の速度があります。下弦の月が少しずつ光を手放していくように、あなたのペースで、一つずつ。手放すたびにあなたは軽くなり、新しい光がその場所を満たしていきます。",
affirmation:"「私は軽やかに目醒めていく」\n「私は氣持ちよく、手放します」",
elements:[  {name:"紫龍",meaning:"霊的な変容と覚醒を司る龍、高次元の意識への架け橋"},
  {name:"階段",meaning:"意識の段階的な上昇と、一歩ずつ確実に進む覚醒のプロセス"},
  {name:"ラベンダー",meaning:"心を鎮める癒しの香りと、紫の光が導く霊的な浄化"},
  {name:"下弦の月",meaning:"手放しと解放の時期、満ちた光を穏やかに返していくリズム"}],imageUrl:"https://www.dropbox.com/scl/fi/2ig9a6c2viuj1980qe47u/oracleapp_37.png?rlkey=9irxjtk5wx6dmotfl6w0z6gn6&st=zzlhqkse&raw=1"},

{id:38,en:"Unlocking Love and Radiant Success",ja:"愛の解錠と輝かしい成功",
soul:"あなたの人生に用意された最も美しい扉は、愛という鍵でしか開かない。そしてその鍵は、ずっとあなたの手の中にあった。",

// ========== 以下はアプリの動作コード（変更不要）==========

let cur=null,isRev=false,mode='random',activePos='upright';

function genStars(){
  const c=document.getElementById('stars');
  const colors=['rgba(200,190,255,0.9)','rgba(220,200,255,0.8)','rgba(255,210,230,0.85)','rgba(180,220,255,0.8)','rgba(255,230,200,0.75)'];
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.2+0.4;
    const col=colors[Math.floor(Math.random()*colors.length)];
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${col};animation-duration:${2.5+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    c.appendChild(s);
  }
}
genStars();

function setMode(m){
  mode=m;
  document.getElementById('btn-random').className='mode-btn'+(m==='random'?' active':'');
  document.getElementById('btn-number').className='mode-btn'+(m==='number'?' active':'');
  document.getElementById('num-area').style.display=m==='number'?'block':'none';
  document.getElementById('main-btn').textContent=m==='random'?'✨ カードを引く ✨':'✨ このカードを見る ✨';
}
function drawCard(){
  let card;
  if(mode==='random'){card=CARDS[Math.floor(Math.random()*CARDS.length)];isRev=Math.random()<0.5;}
  else{
    const n=parseInt(document.getElementById('card-num').value);
    const err=document.getElementById('num-err');
    if(!n||n<1||n>46){err.style.display='block';return;}
    err.style.display='none';
    if(n===45){card=CARDS.find(c=>c.id==='s1');}
    else if(n===46){card=CARDS.find(c=>c.id==='s2');}
    else{card=CARDS[n-1];}
    isRev=false;
  }
  cur=card;activePos=isRev?'reversed':'upright';render();
}
function render(){
  const c=cur;
  document.getElementById('num-label').textContent=c.special ? c.specialSymbol+' / 46' : 'No. '+c.id+' / 44';
  document.getElementById('title-en').textContent='– '+c.en+' –';
  document.getElementById('title-ja').textContent=c.ja;
  document.getElementById('soul-msg').textContent=c.soul;
  const img=document.getElementById('card-img'),ph=document.getElementById('img-ph'),pi=document.getElementById('ph-inner');
  if(c.imageUrl){img.src=c.imageUrl;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='flex';pi.innerHTML='<div style="text-align:center"><div style="font-size:38px;margin-bottom:10px;">✨</div><div style="font-size:13px;color:rgba(140,120,180,0.8);letter-spacing:0.1em">No. '+c.id+'</div><div style="font-size:11px;color:rgba(160,140,200,0.6);margin-top:4px">'+c.en+'</div></div>';}
  document.getElementById('img-wrap').className='card-img-wrap'+(isRev?' is-reversed':'');
  document.getElementById('rev-badge').style.display=isRev?'block':'none';
  updatePos();
  document.getElementById('el-grid').innerHTML=c.elements.map(e=>'<div class="el-item"><div class="el-name">'+e.name+'</div><div class="el-meaning">'+e.meaning+'</div></div>').join('');
  document.getElementById('affirmation').textContent=c.affirmation;
  const cd=document.getElementById('card-display');
  cd.className='card-display visible';
  setTimeout(()=>cd.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function updatePos(){
  document.getElementById('tab-up').className='pos-tab'+(activePos==='upright'?' active':'');
  document.getElementById('tab-rev').className='pos-tab'+(activePos==='reversed'?' active':'');
  document.getElementById('pos-msg').textContent=activePos==='upright'?cur.upright:cur.reversed;
}
function showPos(p){
  activePos=p;
  const imgWrap=document.getElementById('img-wrap');
  if(p==='reversed'){
    imgWrap.className='card-img-wrap is-reversed';
    document.getElementById('rev-badge').style.display='block';
  } else {
    imgWrap.className='card-img-wrap';
    document.getElementById('rev-badge').style.display='none';
  }
  updatePos();
}
function handleErr(){document.getElementById('card-img').style.display='none';document.getElementById('img-ph').style.display='flex';}
function resetApp(){document.getElementById('card-display').className='card-display';document.getElementById('card-num').value='';window.scrollTo({top:0,behavior:'smooth'});}

</script>
</body>
</html>
